    <!-- Primary SEO -->

    <meta name="keywords" content="DemonZeno, DMNZ, trading signals, Binance, crypto signals, free signals, meme token, BLUM" />

    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DemonZeno" />
    <meta property="og:title" content="DemonZeno | Free Trading Signals &amp; DMNZ Token" />
    <meta property="og:description" content="Master the Chaos, Slay the Market, and Trade Like a God. Free daily crypto &amp; forex signals. DMNZ token launching on Blum, April 2, 2028." />
    <meta property="og:url" content="https://demonnzeno.xyz" />
    <meta property="og:image" content="/assets/images/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ZenoDemon" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Dark mode persistence: read from localStorage before React renders -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('demzonzeno-theme');
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
