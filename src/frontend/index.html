    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DemonZeno",
      "url": "https://demonnzeno.xyz",
      "logo": "https://demonnzeno.xyz/favicon.svg",
      "description": "Free premium trading signals for crypto, forex, and stocks. DMNZ token launches April 2, 2028.",
      "sameAs": [
        "https://www.binance.com/en/feed/profile/DemonZeno",
        "https://twitter.com/ZenoDemon"
      ]
    }
    </script>

    <!-- Dark mode persistence: read from localStorage before React renders -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('demzonzeno-theme');
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
